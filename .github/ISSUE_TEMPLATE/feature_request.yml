name: Feature request
description: Suggest an idea or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Applied Smelting is in early beta and its scope is still being defined — feel free to suggest anything, but note it may be filed for later beta releases rather than acted on immediately.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What's the use case or pain point this feature addresses?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about, or existing workarounds.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues to make sure this hasn't already been requested.
          required: true
